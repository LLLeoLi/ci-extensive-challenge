name: Label Issues Based on Keywords

on:
  issues:
    types: [opened]

jobs:
  label_issue:
    runs-on: ubuntu-latest
    steps:
      - name: Label issue with bug
        if: contains(github.event.issue.title, 'error') || contains(github.event.issue.body, 'error')
        run: |
          echo "Adding bug label to issue"
          gh issue edit ${{ github.event.issue.number }} --add-label "bug"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Label issue with feature
        if: contains(github.event.issue.title, 'add') || contains(github.event.issue.body, 'add')
        run: |
          echo "Adding feature label to issue"
          gh issue edit ${{ github.event.issue.number }} --add-label "feature"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}